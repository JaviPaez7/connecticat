services:
  db:
    image: postgres:16-alpine
    container_name: connecticat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: connecticat
      POSTGRES_PASSWORD: connecticat
      POSTGRES_DB: connecticat
    ports:
      - '5433:5432'
    volumes:
      - connecticat_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U connecticat']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  connecticat_pg:
